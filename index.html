<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Workout</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:     #f2f2f7;
      --card:   #ffffff;
      --sh:     0 2px 12px rgba(0,0,0,.08);
      --a:      #ff6b35;
      --b:      #3b82f6;
      --green:  #34c759;
      --red:    #ff3b30;
      --txt:    #1c1c1e;
      --txt2:   #636366;
      --border: #e5e5ea;
      --r:      16px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }
    #screen-done.active { display: flex; }
    .he { direction: rtl; font-family: 'Arial Hebrew', Arial, sans-serif; unicode-bidi: embed; }

    /* ── HOME ── */
    .home-hd { background: white; padding: 24px 16px 16px; border-bottom: 1px solid var(--border); }
    .home-hd h1 { font-size: 28px; font-weight: 800; }
    .home-hd .dt { font-size: 13px; color: var(--txt2); margin-top: 3px; }
    .home-body { padding: 16px; }
    .rc { background: var(--card); border-radius: var(--r); box-shadow: var(--sh); margin-bottom: 16px; overflow: hidden; }
    .rc-top { display: flex; align-items: center; gap: 14px; padding: 18px 18px 12px; cursor: pointer; }
    .rc-top:active { opacity: .8; }
    .rc-badge { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center;
      justify-content: center; font-size: 22px; font-weight: 900; color: white; flex-shrink: 0; }
    .rc-info h2 { font-size: 19px; font-weight: 700; }
    .rc-info .s1 { font-size: 15px; color: var(--txt2); margin-top: 1px; }
    .rc-info .s2 { font-size: 12px; color: var(--txt2); }
    .rc-meta { padding: 0 18px 14px; }
    /* Day buttons */
    .rc-days { display: flex; gap: 5px; margin-bottom: 10px; }
    .day-btn { flex: 1; padding: 6px 0; border: 1.5px solid var(--border); border-radius: 8px;
      background: white; font-size: 11px; font-weight: 700; color: var(--txt2);
      cursor: pointer; transition: all .15s; }
    .day-btn:active { opacity: .7; }
    .day-btn.sel { color: white; border-color: transparent; }
    /* Locker row */
    .rc-locker { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--txt2); }
    .locker-inp { font-size: 13px; font-weight: 700; color: var(--txt);
      background: transparent; border: none; border-bottom: 1.5px dashed var(--border);
      outline: none; width: 60px; padding: 1px 2px; }
    .locker-inp:focus { border-bottom-color: var(--txt2); }
    .rc-btn { display: block; width: calc(100% - 36px); margin: 0 18px 18px; border: none;
      border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; color: white; cursor: pointer; }
    .rc-btn:active { opacity: .85; }
    .h-link { text-align: center; padding: 4px 0 24px; }
    .h-link button { background: none; border: none; color: var(--txt2); font-size: 15px; cursor: pointer; padding: 10px; }

    /* ── WORKOUT HEADER ── */
    .wk-hd { background: white; padding: 10px 16px 0; position: sticky; top: 0; z-index: 10;
      box-shadow: 0 1px 0 var(--border); }
    .wk-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; }
    .wk-left .wk-title { font-size: 17px; font-weight: 700; }
    .wk-back { background: none; border: 1px solid var(--border); color: var(--txt2);
      padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .wk-back:active { opacity: .7; }
    .wk-finish-all { border: none; color: white;
      padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; }
    .wk-finish-all:active { opacity: .8; }
    .hi-del { background: none; border: none; color: #c7c7cc; font-size: 16px;
      cursor: pointer; padding: 4px 8px; border-radius: 6px; }
    .hi-del:active { color: var(--red); }
    .wk-prog { height: 3px; background: var(--border); }
    .wk-fill { height: 100%; border-radius: 2px; transition: width .4s; }
    .wk-body { padding: 12px 16px 40px; }

    /* ── EXERCISE CARD ── */
    .ec { background: var(--card); border-radius: var(--r); box-shadow: var(--sh);
      margin-bottom: 12px; overflow: hidden; border: 2px solid transparent; transition: border-color .15s; }
    .ec.comp  { border-color: var(--green); }
    .ec.exp-a { border-color: var(--a); }
    .ec.exp-b { border-color: var(--b); }

    /* Card top: SVG left, info right */
    .ec-top { display: flex; align-items: stretch; cursor: pointer; }
    .ec-quick-ck { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--border);
      background: white; font-size: 18px; cursor: pointer; flex-shrink: 0;
      margin: auto 12px auto 0;
      display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .ec-quick-ck.done { background: var(--green); border-color: var(--green); color: white; }
    .ec-quick-ck:active { opacity: .7; transform: scale(.9); }
    .ec-svg-wrap { width: 80px; flex-shrink: 0; background: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      border-right: 1px solid var(--border); position: relative; overflow: hidden; }
    .ec-svg-wrap img { width: 80px; height: 80px; object-fit: cover; object-position: top center; display: block; }
    .ec-comp-badge { position: absolute; inset: 0; background: rgba(52,199,89,.18);
      display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .ec-info { flex: 1; padding: 12px 12px 12px 12px; display: flex;
      flex-direction: column; justify-content: space-between; min-width: 0; }
    .ec-name-inp { font-size: 15px; font-weight: 700; line-height: 1.35; margin-bottom: 3px;
      width: 100%; background: transparent; border: none;
      border-bottom: 1px dashed transparent; outline: none;
      direction: auto; font-family: 'Arial Hebrew', Arial, sans-serif;
      color: var(--txt); padding: 0; }
    .ec-name-inp:focus { border-bottom-color: var(--border); }
    .ec-machine { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; font-size: 12px; }
    .ec-machine-inp { font-size: 12px; font-weight: 600; background: transparent;
      border: none; border-bottom: 1px dashed transparent; outline: none;
      flex: 1; min-width: 0; padding: 1px 0; }
    .ec-machine-inp:focus { border-bottom-color: var(--border); }
    .ec-machine-inp::placeholder { color: #c7c7cc; font-weight: 400; }
    .ec-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

    /* Muscle tags */
    .muscle-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; }
    .mtag { font-size: 10px; font-weight: 600; background: #ebebf0; color: var(--txt2);
      padding: 2px 8px; border-radius: 10px; }
    .mtag-key { font-size: 10px; font-weight: 700; background: #fff3e0; color: #e65100;
      padding: 2px 8px; border-radius: 10px; }
    .variant-btn { font-size: 11px; font-weight: 600; background: #f0f0f5; color: var(--txt2);
      border: 1px solid var(--border); border-radius: 10px; padding: 2px 9px; cursor: pointer;
      margin-bottom: 4px; display: inline-flex; align-items: center; gap: 3px; }
    .variant-btn:active { opacity: .7; }

    /* Set dots */
    .sdot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--txt2); flex-shrink: 0; }
    .sdot.d { color: white; border-color: transparent; }

    /* ── EXPAND ── */
    .ec-expand { display: none; border-top: 1px solid var(--border); padding: 12px 14px 14px; }
    .ec-expand.open { display: block; }

    /* Set rows — compact single-line layout */
    .set-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .set-row { background: var(--bg); border-radius: 9px; padding: 7px 10px; }
    .set-row.done { background: rgba(52,199,89,.09); }
    .sr-line { display: flex; align-items: center; gap: 6px; }
    .sr-num { font-size: 11px; font-weight: 700; color: var(--txt2); width: 20px; flex-shrink: 0; }
    .sr-w  { min-width: 52px; max-width: 82px; width: auto; flex: 0 1 70px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13px; font-weight: 700; text-align: center; padding: 5px 4px;
      background: white; color: var(--txt); outline: none; -webkit-appearance: none; }
    .sr-r  { min-width: 44px; max-width: 60px; width: auto; flex: 0 1 50px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13px; font-weight: 700; text-align: center; padding: 5px 4px;
      background: white; color: var(--txt); outline: none; -webkit-appearance: none; }
    .sr-w:focus, .sr-r:focus { border-color: var(--a); }
    .sr-w.fb:focus, .sr-r.fb:focus { border-color: var(--b); }
    .set-row.done .sr-w, .set-row.done .sr-r { color: var(--txt2); background: transparent; border-color: transparent; }
    .sr-x  { font-size: 12px; color: var(--txt2); flex-shrink: 0; }
    .sr-tools { display: flex; gap: 8px; margin-bottom: 10px; }
    .sr-copy-w, .sr-slash { font-size: 11px; font-weight: 700; background: #f0f0f5; color: var(--txt2);
      border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px;
      cursor: pointer; white-space: nowrap; }
    .sr-copy-w:active, .sr-slash:active { opacity: .6; }
    .sr-unit { font-size: 10px; color: var(--txt2); flex-shrink: 0; }
    .sr-note-inp { flex: 1; min-width: 0; font-size: 10px; color: var(--txt2);
      direction: rtl; text-align: right; font-family: 'Arial Hebrew', Arial, sans-serif;
      background: transparent; border: none; border-bottom: 1px dashed transparent;
      outline: none; padding: 2px 0; cursor: text; }
    .sr-note-inp:focus { border-bottom-color: var(--border); color: var(--txt); }
    .set-row.done .sr-note-inp { opacity: .5; pointer-events: none; }
    .sr-prev { font-size: 10px; color: var(--txt2); margin-top: 3px; padding-left: 26px; }
    .sr-prev strong { color: var(--txt); }
    .set-ck { width: 34px; height: 34px; border-radius: 8px; border: 2px solid var(--border);
      background: white; font-size: 16px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .set-ck:active { opacity: .7; }
    .set-ck.done { background: var(--green); border-color: var(--green); color: white; }
    /* Complete-exercise button */
    .complete-ex-btn { width: 100%; border: none; border-radius: 9px; padding: 10px;
      font-size: 13px; font-weight: 700; color: white; cursor: pointer; margin-bottom: 10px; }
    .complete-ex-btn:active { opacity: .75; }

    /* Inline exercise note (next to headline) */
    .ec-note-inp { width: 100%; font-size: 11px; color: var(--txt2);
      background: transparent; border: none; border-bottom: 1px dashed transparent;
      outline: none; padding: 1px 0; margin-top: 2px; font-family: inherit;
      direction: rtl; text-align: left; }
    .rest-row { display: flex; align-items: center; gap: 4px; margin-bottom: 5px; flex-wrap: nowrap; }
    .rest-lbl { font-size: 10px; font-weight: 700; color: var(--txt2); flex-shrink: 0; }
    .rest-opt { font-size: 10px; font-weight: 700; background: #f0f0f5; color: var(--txt2);
      border: 1px solid var(--border); border-radius: 6px; padding: 2px 6px; cursor: pointer; flex-shrink: 0; }
    .rest-opt.sel { color: white; border-color: transparent; }
    .rest-opt:active { opacity: .7; }
    .ec-note-inp::placeholder { color: #c7c7cc; }
    .ec-note-inp:focus { border-bottom-color: var(--border); color: var(--txt); }
    .ec-note-inp:not(:placeholder-shown) { color: var(--txt2); }

    /* History comment */
    .hi-comment { font-size: 12px; color: var(--txt2); margin-top: 4px; font-style: italic; }

    /* ── PROGRESS ── */
    .prog-ex { background: var(--card); border-radius: var(--r); box-shadow: var(--sh);
      padding: 14px 16px; margin-bottom: 12px; }
    .prog-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .prog-stat { font-size: 11px; color: var(--txt2); margin-bottom: 8px; line-height: 1.6; }
    .prog-no-data { font-size: 12px; color: var(--txt2); padding: 4px 0 2px; }
    .prog-section-lbl { font-size: 13px; font-weight: 800; padding: 10px 0 6px; }
    .upscale-badge { font-size: 10px; color: var(--green); font-weight: 700; margin-top: 2px; }
    .home-best { font-size: 11px; color: var(--txt2); padding: 2px 0 6px; }

    /* Preview */
    .pv-ex { background: var(--card); border-radius: var(--r); box-shadow: var(--sh);
      padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .pv-img { width: 56px; height: 56px; object-fit: cover; object-position: top center;
      border-radius: 8px; flex-shrink: 0; background: #1a1a2e; }
    .pv-info { flex: 1; min-width: 0; }
    .pv-name { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .pv-meta { font-size: 11px; color: var(--txt2); margin-top: 3px; }
    .pv-start { display: block; width: calc(100% - 32px); margin: 4px 16px 20px;
      border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700;
      color: white; cursor: pointer; }
    .pv-start:active { opacity: .85; }

    /* ── DONE ── */
    #screen-done { flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 32px; }
    .done-ico { font-size: 80px; margin-bottom: 18px; }
    .done-h   { font-size: 32px; font-weight: 800; margin-bottom: 6px; }
    .done-sub { font-size: 15px; color: var(--txt2); margin-bottom: 28px; }
    .done-crd { background: var(--card); border-radius: var(--r); box-shadow: var(--sh);
      width: 100%; margin-bottom: 24px; }
    .d-row { display: flex; justify-content: space-between; padding: 13px 18px;
      border-bottom: 1px solid var(--border); }
    .d-row:last-child { border-bottom: none; }
    .d-lbl { font-size: 14px; color: var(--txt2); }
    .d-val { font-size: 16px; font-weight: 700; }
    .home-btn { width: 100%; border: none; border-radius: 14px; padding: 16px;
      font-size: 17px; font-weight: 700; color: white; background: var(--green); cursor: pointer; }
    .home-btn:active { opacity: .85; }

    /* ── HISTORY ── */
    .hist-hd { background: white; padding: 16px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 10; }
    .hist-hd h2 { font-size: 24px; font-weight: 800; }
    .back-btn { background: none; border: 1px solid var(--border); color: var(--txt2);
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .hist-body { padding: 16px; }
    .no-hist { text-align: center; color: var(--txt2); padding: 60px 0; font-size: 15px; }
    .si { background: var(--card); border-radius: var(--r); box-shadow: var(--sh);
      padding: 16px; margin-bottom: 12px; cursor: pointer; }
    .si-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .si-r  { font-weight: 700; font-size: 16px; }
    .si-dt { font-size: 13px; color: var(--txt2); }
    .si-m  { font-size: 13px; color: var(--txt2); }
    .si-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .si-detail.open { display: block; }
    .hi-ex { margin-bottom: 10px; }
    .hi-en { font-size: 13px; font-weight: 600; color: var(--txt2); direction: rtl; text-align: right; margin-bottom: 4px; }
    .hi-sets { display: flex; flex-wrap: wrap; gap: 5px; }
    .hi-pill { background: var(--bg); border-radius: 6px; padding: 3px 10px; font-size: 12px; }

    /* ── EXERCISE LIBRARY ── */
    .lib-card { display:flex; align-items:center; gap:12px; background:var(--card);
      border-radius:var(--r); box-shadow:var(--sh); padding:12px; margin-bottom:10px; cursor:pointer; }
    .lib-card:active { opacity:.8; }
    .lib-img { width:64px; height:64px; object-fit:cover; object-position:top center;
      border-radius:10px; flex-shrink:0; background:#1a1a2e; }
    .lib-img-ph { width:64px; height:64px; border-radius:10px; flex-shrink:0; background:#1a1a2e; }
    .lib-info { flex:1; min-width:0; }
    .lib-name { font-size:14px; font-weight:700; margin-bottom:3px; }
    .lib-filters { display:flex; gap:6px; padding:10px 16px 10px; overflow-x:auto;
      background:white; border-bottom:1px solid var(--border); -webkit-overflow-scrolling:touch; }
    .lib-filters::-webkit-scrollbar { display:none; }
    .lib-fbtn { font-size:11px; font-weight:700; background:#f0f0f5; color:var(--txt2);
      border:1.5px solid var(--border); border-radius:20px; padding:5px 12px;
      cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .lib-fbtn.sel { background:var(--txt); color:white; border-color:var(--txt); }
    .lib-fbtn:active { opacity:.7; }
    .lib-modal-wrap { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
      z-index:200; align-items:flex-end; justify-content:center; }
    .lib-modal-sheet { background:white; border-radius:20px 20px 0 0; width:100%;
      max-width:480px; padding:20px; max-height:88vh; overflow-y:auto; }
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-hd">
      <h1>My Workout 💪</h1>
      <div class="dt" id="home-date"></div>
    </div>
    <div class="home-body">
      <div class="rc">
        <div class="rc-top" onclick="viewRoutine('A')">
          <div class="rc-badge" style="background:var(--a)">A</div>
          <div class="rc-info">
            <h2>Routine A</h2>
            <div class="s2">Legs, Back &amp; Abs · 10 exercises</div>
          </div>
        </div>
        <div class="rc-meta" id="rc-meta-a"></div>
        <button class="rc-btn" id="rc-btn-a" style="background:var(--a)" onclick="startWorkout('A')">Start Routine A</button>
      </div>
      <div class="rc">
        <div class="rc-top" onclick="viewRoutine('B')">
          <div class="rc-badge" style="background:var(--b)">B</div>
          <div class="rc-info">
            <h2>Routine B</h2>
            <div class="s2">Chest, Shoulders &amp; Arms · 9 exercises</div>
          </div>
        </div>
        <div class="rc-meta" id="rc-meta-b"></div>
        <button class="rc-btn" id="rc-btn-b" style="background:var(--b)" onclick="startWorkout('B')">Start Routine B</button>
      </div>
      <div class="h-link">
        <button onclick="showHistory()">📋 History</button>
        <button onclick="showLibrary()" style="margin-left:12px">💪 Exercises</button>
        <button onclick="showProgress()" style="margin-left:12px">📈 Progress</button>
        <button onclick="resetWeek()" style="margin-left:12px;font-size:13px;color:#aaa">↺ Reset Week</button>
        <button onclick="forceUpdate()" style="margin-left:12px;font-size:13px;color:#aaa">↻ Update App</button>
        <button onclick="showSyncCode()" style="margin-left:12px;font-size:13px;color:#aaa">🔑 Sync</button>
      </div>
    </div>
  </div>

  <!-- WORKOUT -->
  <div id="screen-workout" class="screen">
    <div class="wk-hd">
      <div class="wk-bar">
        <div class="wk-left">
          <div class="wk-title" id="wk-title"></div>
        </div>
        <button class="wk-back" onclick="confirmEnd()">← Back</button>
        <button class="wk-finish-all" id="wk-finish-all-btn" onclick="completeAllAndFinish()">✓ Finish Workout</button>
      </div>
      <div class="wk-prog"><div class="wk-fill" id="wk-fill" style="width:0%"></div></div>
    </div>
    <div class="wk-body" id="wk-body"></div>
  </div>

  <!-- DONE -->
  <div id="screen-done" class="screen">
    <div class="done-ico">🏆</div>
    <div class="done-h">Workout Done!</div>
    <div class="done-sub" id="done-sub"></div>
    <div class="done-crd" id="done-stats"></div>
    <button class="home-btn" onclick="goHome()">Back to Home</button>
  </div>

  <!-- PREVIEW -->
  <div id="screen-preview" class="screen">
    <div class="hist-hd">
      <h2 id="preview-title"></h2>
      <button class="back-btn" onclick="goHome()">← Back</button>
    </div>
    <div class="hist-body" id="preview-body"></div>
  </div>

  <!-- PROGRESS -->
  <div id="screen-progress" class="screen">
    <div class="hist-hd">
      <h2>📈 Progress</h2>
      <button class="back-btn" onclick="goHome()">← Back</button>
    </div>
    <div class="hist-body" id="progress-body"></div>
  </div>

  <!-- LIBRARY -->
  <div id="screen-library" class="screen">
    <div class="hist-hd">
      <h2>💪 Exercises</h2>
      <button class="back-btn" onclick="goHome()">← Back</button>
    </div>
    <div id="library-body"></div>
    <div id="lib-modal" class="lib-modal-wrap" onclick="closeLibDetail(event)">
      <div class="lib-modal-sheet" onclick="event.stopPropagation()">
        <div id="lib-modal-content"></div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="screen-history" class="screen">
    <div class="hist-hd">
      <h2>History</h2>
      <button class="back-btn" onclick="goHome()">← Back</button>
    </div>
    <div class="hist-body" id="hist-body"></div>
  </div>

// SUPABASE

const SUPABASE_URL = 'https://idatbejilvjxdaewxjoc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkYXRiZWppbHZqeGRhZXd4am9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNzQ1ODcsImV4cCI6MjA5MTY1MDU4N30.CSL3dls3QvBhSK5O2880jlvzsH0-JKAmvxj9ux2z20s';

let _sbClient = null;
function getSb() {
  if (!_sbClient) _sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return _sbClient;
}

function getUserId() {
  let id = localStorage.getItem('mwUserId');
  if (!id) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    id = 'mw-' + code;
    localStorage.setItem('mwUserId', id);
  }
  return id;
}
function getSyncCode() { return getUserId().replace('mw-', ''); }

let _sbTimer = null;
function sbSaveDebounced() {
  clearTimeout(_sbTimer);
  _sbTimer = setTimeout(() => {
    getSb().from('workout_store').upsert({
      user_id: getUserId(),
      sessions_data: get(),
      prefs_data: getPrefs(),
      current_session: loadCurrentSession(),
      updated_at: new Date().toISOString()
    }).then(({ error }) => { if (error) console.warn('SB save error:', error); });
  }, 1500);
}

function mergePrefs(remote, local) {
  if (!local || !Object.keys(local).length) return remote || {};
  if (!remote || !Object.keys(remote).length) return local;
  const m = { ...remote };
  Object.keys(local).forEach(k => {
    if (local[k] && typeof local[k]==='object' && !Array.isArray(local[k]) &&
        remote[k] && typeof remote[k]==='object' && !Array.isArray(remote[k])) {
      m[k] = { ...remote[k], ...local[k] };
    } else {
      m[k] = local[k];
    }
  });
  return m;
}

async function initApp() {
  try {
    const { data } = await getSb()
      .from('workout_store')
      .select('*')
      .eq('user_id', getUserId())
      .maybeSingle();

    if (data) {
      const localSessions = get();
      const localPrefs    = getPrefs();
      // Merge sessions: deduplicate by id, local wins
      const all = [...(data.sessions_data?.sessions||[]), ...localSessions.sessions];
      const byId = {};
      all.forEach(s => { byId[s.id] = s; });
      const merged = { sessions: Object.values(byId).sort((a,b)=>b.id-a.id) };
      // Merge prefs: remote base, local overrides
      const mergedPrefs = mergePrefs(data.prefs_data||{}, localPrefs);
      // Current session: keep local if exists, else restore from Supabase
      const localCurrent = loadCurrentSession();
      const current = localCurrent || data.current_session || null;
      localStorage.setItem('mwData3', JSON.stringify(merged));
      localStorage.setItem('mwPrefs', JSON.stringify(mergedPrefs));
      if (!localCurrent && current) localStorage.setItem('mwCurrent', JSON.stringify(current));
      // Push merged back to Supabase (fire and forget)
      getSb().from('workout_store').upsert({
        user_id: getUserId(), sessions_data: merged, prefs_data: mergedPrefs,
        current_session: current, updated_at: new Date().toISOString()
      });
    } else {
      // No remote data yet → push existing local data to Supabase
      const d = get(), p = getPrefs(), c = loadCurrentSession();
      getSb().from('workout_store').upsert({
        user_id: getUserId(), sessions_data: d, prefs_data: p,
        current_session: c, updated_at: new Date().toISOString()
      });
    }
  } catch(e) {
    console.warn('Supabase init error:', e);
  }

  homeUpdate();
  const saved = loadCurrentSession();
  if (saved) {
    S.rid = saved.rid; S.session = saved.session; S.expanded = null;
    show('workout'); wkRender();
  }
}


function showSyncCode() {
  const code = getSyncCode();

    'Your sync code: ' + code + '\n\n' +
    'Write this down! Enter it on any other device to access your data.\n\n' +
    'To link this device to another device, enter that device\'s 6-letter code below\n(leave empty to cancel):'
  );
  if (res === null || res.trim() === '') return;
  const newCode = res.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if (newCode.length !== 6) { alert('Sync code must be 6 characters'); return; }
  if (newCode === code) { alert('That is already your sync code!'); return; }
  if (confirm('Switch to sync code ' + newCode + '?\nThis device will load data from that sync code.')) {
    localStorage.setItem('mwUserId', 'mw-' + newCode);
    location.reload();
  }
}

function _mHex(m) { return MUSCLE_COLORS[m] || '#aaa'; }

  const c = _mHex(m);

function libraryRender() {
  const el = document.getElementById('library-body');
  const filtered = _libFilter
    ? EXERCISE_LIBRARY.filter(e => e.muscles.includes(_libFilter))
    : EXERCISE_LIBRARY;

  const filterBtns = [
    `<button class="lib-fbtn${!_libFilter?' sel':''}" onclick="librarySetFilter(null)">All</button>`,
    ...Object.entries(MUSCLE_LABELS).map(([k,v]) => {
      const isSel = _libFilter === k;
      const col = _mHex(k);
      return `<button class="lib-fbtn${isSel?' sel':''}" onclick="librarySetFilter('${k}')"
        style="${isSel?`background:${col};color:white;border-color:${col};`:''}">${v}</button>`;
    })
  ].join('');

  const cards = filtered.map((ex, fi) => {
    const idx = EXERCISE_LIBRARY.indexOf(ex);
    const imgSrc = ex.img ? `${_EX_BASE}${ex.img}/0.jpg` : '';

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
function goHome() {
  S.session = null;
  homeUpdate(); show('home');
}
function forceUpdate() {
  clearCurrentSession();
  if ('caches' in window) {
    caches.keys().then(names => names.forEach(n => caches.delete(n)));
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs =>
      Promise.all(regs.map(r => r.unregister()))
    );
  }
  fetch(location.pathname, { cache: 'no-store' })
    .then(() => location.reload())
    .catch(() => location.reload());
}
function showHistory() { histRender(); show('history'); }

// ════════════════════════════════════
// PROGRESS
// ════════════════════════════════════
function isBW(w) { return w === '.' || w === 'BW' || w === 'bw'; }
function displayWeight(w) {
  if (!w && w !== 0) return w;
  return isBW(String(w)) ? 'BW' : w;
}

function getExerciseProgress(exName) {
  const d = get();
  return d.sessions
    .sort((a,b) => a.id - b.id)
    .map(s => {
      const ex = s.exercises.find(e => e.name === exName);
      if (!ex) return null;
      // Separate BW sets from weighted sets
      const doneSets = ex.sets.filter(set=>set.done && set.w);
      const bwSets = doneSets.filter(set=>isBW(String(set.w)));
      const weights = doneSets.filter(set=>!isBW(String(set.w)))
        .map(set=>parseFloat(set.w)).filter(w=>!isNaN(w) && w>0);
      const hasBW = bwSets.length > 0;
      if (!weights.length && !hasBW) return null;
      // BW = 0 added weight — baseline for progress comparison
      return { date: s.id, max: weights.length ? Math.max(...weights) : 0, bw: hasBW && !weights.length };
    }).filter(Boolean);
}

function getLastUpscale(exName) {
  const pts = getExerciseProgress(exName); // BW = 0, included in comparison
  let last = null;
  for (let i = 1; i < pts.length; i++) {
    if (pts[i].max > pts[i-1].max)
      last = { date: pts[i].date, from: pts[i-1].max, to: pts[i].max };
  }
  return last;
}

function drawMiniChart(pts, hexColor) {
  if (pts.length < 2) return `<div class="prog-no-data">Not enough data yet — need at least 2 sessions</div>`;
  const W = 300, H = 72;
  const maxW = Math.max(...pts.map(p=>p.max));
  const minW = Math.min(...pts.map(p=>p.max));
  const range = maxW - minW || 1;
  const coords = pts.map((p,i) => ({
    x: 8 + (i/(pts.length-1)) * (W-16),
    y: H - 18 - ((p.max - minW)/range) * (H-30),
    ...p
  }));
  const poly = coords.map(c=>`${c.x},${c.y}`).join(' ');
  const diff = pts[pts.length-1].max - pts[0].max;
  const diffColor = diff > 0 ? '#34c759' : diff < 0 ? '#ff3b30' : '#636366';
  const diffStr = diff > 0 ? `+${diff}kg 📈` : diff < 0 ? `${diff}kg 📉` : 'no change';
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">
    <polyline points="${poly}" fill="none" stroke="${hexColor}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${coords.map(c=>`<circle cx="${c.x}" cy="${c.y}" r="3.5" fill="${c.bw?'#aaa':hexColor}"/>`).join('')}
    <text x="8" y="${H}" font-size="9" fill="#aaa">${new Date(pts[0].date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</text>
    <text x="${W-8}" y="${H}" font-size="9" fill="#aaa" text-anchor="end">${new Date(pts[pts.length-1].date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</text>
  </svg>
  <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:2px">
    <span style="color:var(--txt2)">${minW===0?'BW':minW+'kg'} → ${maxW}kg</span>
    <span style="font-weight:700;color:${diffColor}">${diffStr}</span>
    <span style="color:var(--txt2)">${pts.length} sessions</span>
  </div>`;
}

function progressRender() {
  const el = document.getElementById('progress-body');
  const d = get();
  if (!d.sessions.length) {
    el.innerHTML = '<div class="no-hist">No workouts yet 💪<br>Start your first session!</div>';
    return;
  }
  el.innerHTML = ['A','B'].map(rid => {
    const hexColor = rid==='A' ? '#ff6b35' : '#3b82f6';
    const color = rid==='A' ? 'var(--a)' : 'var(--b)';
    const cards = ROUTINES[rid].exercises.map(ex => {
      const pts = getExerciseProgress(ex.name);
      const lastUp = getLastUpscale(ex.name);
      const best = pts.length ? Math.max(...pts.map(p=>p.max)) : null;
      const lastUpStr = lastUp
        ? `· <span style="color:var(--green);font-weight:700">Last increase: ${new Date(lastUp.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})} (+${lastUp.to-lastUp.from}kg)</span>`
        : '';
      return `<div class="prog-ex">
        <div class="prog-name">${ex.key?'🔥 ':''}${ex.name}</div>
        <div class="prog-stat">Best: <strong>${best!=null?best+'kg':'—'}</strong> ${lastUpStr}</div>
        ${drawMiniChart(pts, hexColor)}
      </div>`;
    }).join('');
    return `<div class="prog-section-lbl" style="color:${color}">Routine ${rid}</div>${cards}`;
  }).join('');
}

function viewRoutine(rid) {
  const saved = loadCurrentSession();
  if (saved && saved.rid === rid) {
    S.rid = saved.rid; S.session = saved.session; S.expanded = null;
    S.viewing = false;
  } else {
    S.rid = rid; S.expanded = null; S.viewing = true;
    S.session = {
      id: Date.now(), routine: rid,
      startTime: Date.now(), endTime: null,
      exercises: ROUTINES[rid].exercises.map(ex => ({
        name: ex.name,
        machine: (getPrefs().machines && getPrefs().machines[ex.name]) || ex.machine || '',
        comment: (getPrefs().comments && getPrefs().comments[ex.name]) || '',
        variantIdx: ex.variants ? getVariantIdx(ex.name) : undefined,
        sets: ex.sets.map(def=>({w:null,r:null,done:false,note:def.n}))
      }))
    };
  }
  show('workout'); wkRender();
}

// ════════════════════════════════════
// PREFS (locker + day per routine)
// ════════════════════════════════════
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const COLORS = { A: 'var(--a)', B: 'var(--b)' };
const DEFAULT_LOCKERS = { A: '102', B: '719' };

function getPrefs() {
  try { return JSON.parse(localStorage.getItem('mwPrefs')) || {}; } catch(e) { return {}; }
}
function putPrefs(p) { localStorage.setItem('mwPrefs', JSON.stringify(p)); sbSaveDebounced(); }

function getExName(origName) {
  const p = getPrefs();
  return (p.exNames && p.exNames[origName]) || origName;
}
function saveExName(rid, ei, newName) {
  const orig = ROUTINES[rid].exercises[ei].name;
  const p = getPrefs();
  if (!p.exNames) p.exNames = {};
  if (newName && newName !== orig) p.exNames[orig] = newName;
  else delete p.exNames[orig];
  putPrefs(p);
}

function setDay(rid, day) {
  const p = getPrefs();
  if (!p[rid]) p[rid] = {};
  // migrate old single-day format
  if (!Array.isArray(p[rid].days)) p[rid].days = p[rid].day ? [p[rid].day] : [];
  delete p[rid].day;
  const idx = p[rid].days.indexOf(day);
  if (idx >= 0) p[rid].days.splice(idx, 1); else p[rid].days.push(day);
  putPrefs(p);
  homeUpdate();
}
function setLocker(rid, val) {
  const p = getPrefs();
  if (!p[rid]) p[rid] = {};
  p[rid].locker = val;
  putPrefs(p);
}
function getVariantIdx(exName) {
  const p = getPrefs();
  return (p.variants && p.variants[exName] != null) ? p.variants[exName] : 0;
}
function saveRest(exName, val, ei) {
  const p = getPrefs();
  if (!p.rest) p.rest = {};
  p.rest[exName] = val;
  putPrefs(p);
  S.expanded = ei;
  wkRender();
}
function saveVariantIdx(exName, idx) {
  const p = getPrefs();
  if (!p.variants) p.variants = {};
  p.variants[exName] = idx;
  putPrefs(p);
}

function checkMidnightReset() {
  const today = new Date().toDateString();
  const last  = localStorage.getItem('mwLastDate');
  if (last !== today) {
    const p = getPrefs();
    ['A','B'].forEach(r => { if (p[r]) p[r].locker = ''; });
    putPrefs(p);
    localStorage.setItem('mwLastDate', today);
  }
}
function resetWeek() {
  const p = getPrefs();
  ['A','B'].forEach(r => { if (p[r]) p[r].days = []; });
  putPrefs(p);
  homeUpdate();
}
function homeUpdate() {
  checkMidnightReset();
  document.getElementById('home-date').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const d = get();
  const p = getPrefs();
  ['A','B'].forEach(r => {
    const pref    = p[r] || {};
    const locker  = pref.locker !== undefined ? pref.locker : DEFAULT_LOCKERS[r];
    const selDays = Array.isArray(pref.days) ? pref.days : (pref.day ? [pref.day] : []);
    const color   = COLORS[r];
    const last    = d.sessions.filter(s=>s.routine===r).sort((a,b)=>b.id-a.id)[0];
    const lastTxt = last
      ? `<span style="font-size:12px;color:var(--txt2)">📅 ${new Date(last.id).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`
      : '';
    const dayBtns = DAYS.map(dy => {
      const isSel = selDays.includes(dy);
      const style = isSel ? `style="background:${color}"` : '';
      return `<button class="day-btn${isSel?' sel':''}" ${style}
        onclick="setDay('${r}','${dy}')">${dy}</button>`;
    }).join('');
    document.getElementById('rc-meta-'+r.toLowerCase()).innerHTML = `
      <div class="rc-days">${dayBtns}</div>
      <div class="rc-locker">
        🔐 Locker
        <input class="locker-inp" value="${locker.replace(/"/g,'&quot;')}"
          oninput="setLocker('${r}',this.value)">
        ${lastTxt}
      </div>`;
    // Resume button if session in progress for this routine
    const saved = loadCurrentSession();
    const btn = document.getElementById('rc-btn-'+r.toLowerCase());
    if (btn) {
      if (saved && saved.rid === r) {
        btn.textContent = '▶ Resume Routine ' + r;
      } else {
        btn.textContent = 'Start Routine ' + r;
      }
    }
  });
}

function startWorkout(rid) {
  // Add today if not already selected (don't toggle off)
  const _today = DAYS[new Date().getDay()];
  const _p = getPrefs();
  if (!_p[rid]) _p[rid] = {};
  if (!Array.isArray(_p[rid].days)) _p[rid].days = [];
  if (!_p[rid].days.includes(_today)) { _p[rid].days.push(_today); putPrefs(_p); }
  S.rid = rid; S.expanded = null; S.viewing = false;
  S.session = {
    id: Date.now(), routine: rid,
    startTime: Date.now(), endTime: null,
    exercises: ROUTINES[rid].exercises.map(ex => ({
      name: ex.name,
      machine: (getPrefs().machines && getPrefs().machines[ex.name]) || ex.machine || '',
      comment: (getPrefs().comments && getPrefs().comments[ex.name]) || '',
      variantIdx: ex.variants ? getVariantIdx(ex.name) : undefined,
      sets: ex.sets.map(def=>({w:null,r:null,done:false,note:def.n}))
    }))
  };
  show('workout');
  wkRender();
}

// ════════════════════════════════════
// RENDER WORKOUT
// ════════════════════════════════════
function ac() { return S.rid==='A' ? 'var(--a)' : 'var(--b)'; }
function acHex() { return S.rid==='A' ? '#ff6b35' : '#3b82f6'; }

function wkRender() {
  const rt = ROUTINES[S.rid];
  document.getElementById('wk-title').textContent = 'Routine '+S.rid;
  document.getElementById('wk-finish-all-btn').style.background = ac();
  document.getElementById('wk-finish-all-btn').style.display = S.viewing ? 'none' : '';
  document.getElementById('wk-fill').style.background = ac();
  const total = rt.exercises.reduce((s,e)=>s+e.sets.length,0);
  const done  = S.session.exercises.reduce((s,e)=>s+e.sets.filter(x=>x.done).length,0);
  document.getElementById('wk-fill').style.width = (total?done/total*100:0)+'%';
  document.getElementById('wk-body').innerHTML =
    rt.exercises.map((ex,i) => buildCard(ex,i)).join('');
}

function buildCard(ex, i) {
  const ses     = S.session.exercises[i];
  const allDone = ses.sets.every(s=>s.done);
  const isExp   = S.expanded === i;
  const color   = ac();
  const isB     = S.rid==='B';

  let cls = 'ec';
  if (allDone)  cls += ' comp';
  else if(isExp) cls += isB ? ' exp-b' : ' exp-a';

  // Variant support (e.g. "Lat Pulldown" vs "Pull Up")
  const variants   = ex.variants || null;
  const variantIdx = ses.variantIdx || 0;
  const activeName = variants ? variants[variantIdx] : ex.name;
  const otherName  = variants ? variants[1 - variantIdx] : null;

  // Exercise illustration + completion overlay
  const imgHtml  = getExerciseImg(activeName);
  const compBadge = allDone ? `<div class="ec-comp-badge">✅</div>` : '';

  // Set dots
  const dots = ses.sets.map((s,si)=>
    s.done
      ? `<span class="sdot d" style="background:${color}">✓</span>`
      : `<span class="sdot">${si+1}</span>`
  ).join('');

  // Machine editable input (always shown)
  const machVal = (ses.machine||'').replace(/"/g,'&quot;');
  const mach = `<div class="ec-machine">
    <span style="font-size:11px">📍</span>
    <input class="ec-machine-inp" id="mx${i}" style="color:${color}"
      value="${machVal}" placeholder="machine / bench / location"
      onclick="event.stopPropagation()"
      oninput="saveMachine(${i},this.value)">
  </div>`;
  const keyBadge = ex.key ? `<span class="mtag-key">🔥 Key</span>` : '';
  const tags = (ex.muscles||[]).map(m =>
    `<span class="mtag">${MUSCLE_LABELS[m]||m}</span>`
  ).join('');
  const muscleTags = tags ? `<div class="muscle-tags">${tags}</div>` : '';

  // ── Expanded section: all sets + comment ──
  let expandHtml = '';
  if (isExp) {
    const focCls = isB ? ' fb' : '';
    const setRows = ex.sets.map((def, si) => {
      const set  = ses.sets[si];
      const prevW = prevSetW(ex.name, si);
      const defW = set._pw !== undefined ? set._pw
                 : set.done ? (set.w||'')
                 : (prevW!==null ? prevW : (def.w||''));
      const prevR = prevSetR(ex.name, si);
      const defR = set._pr !== undefined ? set._pr
                 : set.done ? (set.r||'')
                 : (prevR !== null ? prevR : (def.r||''));
      const doneCls = set.done ? ' done' : '';
      const ckCls   = set.done ? ' done' : '';
      const ckIcon  = set.done ? '✓' : '○';
      return `
        <div class="set-row${doneCls}">
          <div class="sr-line">
            <span class="sr-num">S${si+1}</span>
            <input class="sr-w${focCls}" id="iw${i}_${si}" type="text" inputmode="decimal"
              placeholder="kg" value="${defW}"
              onfocus="this.setSelectionRange(this.value.length,this.value.length)"
              oninput="liveSave(${i},${si},'w',this.value)">
            <span class="sr-x">×</span>
            <input class="sr-r${focCls}" id="ir${i}_${si}" type="text" inputmode="numeric"
              placeholder="${def.r||'—'}" value="${defR}"
              onfocus="this.setSelectionRange(this.value.length,this.value.length)"
              oninput="liveSave(${i},${si},'r',this.value)">
            <input class="sr-note-inp" id="in${i}_${si}"
              value="${(set.note||def.n||'').replace(/"/g,'&quot;')}"
              oninput="saveSetNote(${i},${si},this.value)">
            <button class="set-ck${ckCls}" onclick="toggleSet(${i},${si})">${ckIcon}</button>
          </div>
          ${!set.done && prevW!==null ? `<div class="sr-prev">Last: <strong>${displayWeight(prevW)}${!isBW(String(prevW))?' kg':''}</strong></div>` : ''}
        </div>`;
    }).join('');

    const allExDone = ses.sets.every(s=>s.done);
    const compExBtn = allExDone
      ? `<button class="complete-ex-btn" style="background:#636366"
           onclick="undoExercise(${i})">↩ Undo — mark as not done</button>`
      : `<button class="complete-ex-btn" style="background:${color}"
           onclick="completeExercise(${i})">✓ Mark all sets done</button>`;
    expandHtml = `
      <div class="ec-expand open">
        ${compExBtn}
        <div class="sr-tools">
          <button class="sr-slash" onclick="insertSlash('iw${i}_0')">/</button>
          <button class="sr-copy-w" onclick="copyWeightToAll(${i},0)">Copy first to all</button>
        </div>
        <div class="set-list">${setRows}</div>
      </div>`;
  }

  const qkCls  = allDone ? ' done' : '';
  const qkIcon = allDone ? '✓' : '○';
  return `<div class="${cls}" id="ec${i}">
    <div class="ec-top" onclick="toggleCard(${i})">
      <div class="ec-svg-wrap">${imgHtml}${compBadge}</div>
      <div class="ec-info">
        <div style="display:flex;align-items:center;gap:6px">
          <input class="ec-name-inp" value="${activeName.replace(/"/g,'&quot;')}"
            onclick="event.stopPropagation()"
            oninput="saveExName('${S.rid}',${i},this.value)">
          ${keyBadge}
        </div>
        ${variants ? `<button class="variant-btn" onclick="event.stopPropagation();switchVariant(${i})">⇄ ${otherName}</button>` : ''}
        ${mach}
        ${muscleTags}
        ${(()=>{ const REST_OPTS=['2:00','1:30','1:10','0:50']; const savedRest=(getPrefs().rest&&getPrefs().rest[ex.name])||''; return `<div class="rest-row" onclick="event.stopPropagation()"><span class="rest-lbl">Rest:</span>${REST_OPTS.map(o=>`<button class="rest-opt${savedRest===o?' sel':''}" style="${savedRest===o?'background:'+color+';':''}" onclick="event.stopPropagation();saveRest('${ex.name}','${o}',${i})">${o}</button>`).join('')}</div>`; })()}
        ${(()=>{ const u=getLastUpscale(ex.name); return u?`<div class="upscale-badge">📈 Last increase: ${new Date(u.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})} (${u.from}→${u.to}kg)</div>`:''; })()}
        <input class="ec-note-inp" id="cm${i}" type="text" dir="rtl"
          placeholder="note..."
          value="${(ses.comment||'').replace(/"/g,'&quot;')}"
          onclick="event.stopPropagation()"
          oninput="saveComment(${i},this.value)">
        <div class="ec-row">${dots}</div>
      </div>
      <button class="ec-quick-ck${qkCls}"
        onclick="event.stopPropagation();quickToggleExercise(${i})">${qkIcon}</button>
    </div>
    ${expandHtml}
  </div>`;
}

function toggleCard(i) {
  savePendingInputs();
  S.expanded = S.expanded===i ? null : i;
  wkRender();
  setTimeout(()=>{
    const el = document.getElementById('ec'+i);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },60);
}

function prevSetW(name, idx) {
  // First check saved weights in prefs (survives history deletion)
  const p = getPrefs();
  if (p.lastWeights && p.lastWeights[name] && p.lastWeights[name][idx] != null)
    return p.lastWeights[name][idx];
  // Fall back to history
  const d = get();
  const prev = d.sessions.filter(s=>s.routine===S.rid).sort((a,b)=>b.id-a.id)[0];
  if(!prev) return null;
  const ex = prev.exercises.find(e=>e.name===name);
  if(!ex||!ex.sets[idx]||!ex.sets[idx].done) return null;
  return ex.sets[idx].w;
}
function saveLastWeights(exName, sets) {
  const p = getPrefs();
  if (!p.lastWeights) p.lastWeights = {};
  if (!p.lastReps)    p.lastReps    = {};
  p.lastWeights[exName] = sets.map(s => s._pw || s.w || null);
  p.lastReps[exName]    = sets.map(s => s._pr || s.r || null);
  putPrefs(p);
}
function prevSetR(name, idx) {
  const p = getPrefs();
  if (p.lastReps && p.lastReps[name] && p.lastReps[name][idx] != null)
    return p.lastReps[name][idx];
  return null;
}

// ════════════════════════════════════
// SET TOGGLE + SAVE HELPERS
// ════════════════════════════════════
function insertSlash(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = el.selectionStart, end = el.selectionEnd;
  const val = el.value;
  el.value = val.slice(0, start) + '/' + val.slice(end);
  el.setSelectionRange(start + 1, start + 1);
  el.focus();
}

function liveSave(ei, si, field, val) {
  if (!S.session) return;
  const ex = S.session.exercises[ei];
  const set = ex.sets[si];
  if (field === 'w') set._pw = val;
  else set._pr = val;
  saveLastWeights(ex.name, ex.sets);
  saveCurrentSession();
}

function copyWeightToAll(ei, si) {
  const val = document.getElementById('iw'+ei+'_'+si).value;
  if (!val) return;
  const sets = S.session.exercises[ei].sets;
  sets.forEach((set, idx) => { set._pw = val; });
  wkRender();
}

function savePendingInputs() {
  if (!S.session) return;
  S.session.exercises.forEach((ex, ei) => {
    ex.sets.forEach((set, si) => {
      if (!set.done) {
        const wEl = document.getElementById('iw'+ei+'_'+si);
        const rEl = document.getElementById('ir'+ei+'_'+si);
        if (wEl) set._pw = wEl.value;
        if (rEl) set._pr = rEl.value;
      }
      const nEl = document.getElementById('in'+ei+'_'+si);
      if (nEl) set.note = nEl.value;
    });
    const cmEl = document.getElementById('cm'+ei);
    if (cmEl) ex.comment = cmEl.value;
    const mxEl = document.getElementById('mx'+ei);
    if (mxEl) ex.machine = mxEl.value;
  });
}

function saveComment(ei, val) {
  if (!S.session || !S.session.exercises[ei]) return;
  S.session.exercises[ei].comment = val;
  const p = getPrefs();
  if (!p.comments) p.comments = {};
  p.comments[S.session.exercises[ei].name] = val;
  putPrefs(p);
  saveCurrentSession();
}

function saveMachine(ei, val) {
  if (!S.session || !S.session.exercises[ei]) return;
  S.session.exercises[ei].machine = val;
  const p = getPrefs();
  if (!p.machines) p.machines = {};
  p.machines[S.session.exercises[ei].name] = val;
  putPrefs(p);
  saveCurrentSession();
}

function saveSetNote(ei, si, val) {
  if (S.session && S.session.exercises[ei]) S.session.exercises[ei].sets[si].note = val;
}

function toggleSet(ei, si) {
  savePendingInputs();
  const set = S.session.exercises[ei].sets[si];
  if (!set.done) {
    set.w = (set._pw !== undefined && set._pw !== '') ? set._pw : (set.w || null);
    set.r = (set._pr !== undefined && set._pr !== '') ? set._pr : (set.r || null);
    delete set._pw; delete set._pr;
    set.done = true;
    saveLastWeights(S.session.exercises[ei].name, S.session.exercises[ei].sets);
  } else {
    set.done = false;
  }
  if (S.session.exercises.every(e=>e.sets.every(s=>s.done))) {
    setTimeout(finish, 700);
    return;
  }
  saveCurrentSession();
  wkRender();
  setTimeout(()=>{
    const el = document.getElementById('ec'+ei);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },60);
}

function completeExercise(ei) {
  savePendingInputs();
  const ex  = S.session.exercises[ei];
  const def = ROUTINES[S.rid].exercises[ei];
  ex.sets.forEach((set, si) => {
    if (!set.done) {
      set.w = (set._pw !== undefined && set._pw !== '') ? set._pw
            : (set.w !== null ? set.w : (def.sets[si].w || null));
      set.r = (set._pr !== undefined && set._pr !== '') ? set._pr
            : (set.r !== null ? set.r : (def.sets[si].r || null));
      delete set._pw; delete set._pr;
      set.done = true;
    }
  });
  saveLastWeights(ex.name, ex.sets);
  if (S.session.exercises.every(e=>e.sets.every(s=>s.done))) {
    setTimeout(finish, 700);
    return;
  }
  S.expanded = null;
  wkRender();
  setTimeout(()=>{
    const el = document.getElementById('ec'+ei);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },60);
}

function undoExercise(ei) {
  S.session.exercises[ei].sets.forEach(set => { set.done = false; });
  wkRender();
  setTimeout(()=>{
    const el = document.getElementById('ec'+ei);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },60);
}

function quickToggleExercise(ei) {
  savePendingInputs();
  const allDone = S.session.exercises[ei].sets.every(s=>s.done);
  if (allDone) {
    undoExercise(ei);
  } else {
    completeExercise(ei);
  }
}

function switchVariant(ei) {
  savePendingInputs();
  const ex  = ROUTINES[S.rid].exercises[ei];
  const ses = S.session.exercises[ei];
  ses.variantIdx = (ses.variantIdx || 0) === 0 ? 1 : 0;
  saveVariantIdx(ex.name, ses.variantIdx);
  wkRender();
}

// ════════════════════════════════════
// FINISH
// ════════════════════════════════════
function finish() {
  savePendingInputs();
  clearCurrentSession();
  S.session.endTime = Date.now();
  const d = get(); d.sessions.push(S.session); put(d);
  const dur  = Math.round((S.session.endTime-S.session.startTime)/60000);
  const sets = S.session.exercises.reduce((s,e)=>s+e.sets.filter(x=>x.done).length,0);
  document.getElementById('done-sub').textContent =
    `Routine ${S.rid} · ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  document.getElementById('done-stats').innerHTML = `
    <div class="d-row"><span class="d-lbl">Duration</span><span class="d-val">${dur} min</span></div>
    <div class="d-row"><span class="d-lbl">Exercises</span><span class="d-val">${S.session.exercises.length}</span></div>
    <div class="d-row"><span class="d-lbl">Sets logged</span><span class="d-val">${sets}</span></div>`;
  show('done');
}

function confirmEnd() {
  if (S.viewing) {
    savePendingInputs();
    if (S.session) {
      S.session.exercises.forEach(ex => saveLastWeights(ex.name, ex.sets));
    }
    clearCurrentSession();
    S.session=null; S.viewing=false; homeUpdate(); show('home');
  } else {
    savePendingInputs();
    saveCurrentSession();
    S.session=null; homeUpdate(); show('home');
  }
}
function completeAllAndFinish() {
  savePendingInputs();
  S.session.exercises.forEach(ex => {
    ex.sets.forEach(set => {
      if (!set.done) {
        set.w = set._pw || set.w || null;
        set.r = set._pr || set.r || null;
        delete set._pw; delete set._pr;
        set.done = true;
      }
    });
    saveLastWeights(ex.name, ex.sets);
  });
  finish();
}

// ════════════════════════════════════
// HISTORY
// ════════════════════════════════════
function histRender() {
  const d = get();
  const all = [...d.sessions].sort((a,b)=>b.id-a.id);
  const el  = document.getElementById('hist-body');
  if (!all.length) { el.innerHTML='<div class="no-hist">No workouts yet 💪<br>Start your first session!</div>'; return; }
  el.innerHTML = all.map((s,i)=>{
    const date = new Date(s.id).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
    const dur  = s.endTime ? Math.round((s.endTime-s.id)/60000)+' min' : '—';
    const tot  = s.exercises.reduce((x,e)=>x+e.sets.filter(y=>y.done).length,0);
    const exH  = s.exercises.map(ex=>{
      const ds = ex.sets.filter(s=>s.done);
      if(!ds.length) return '';
      return `<div class="hi-ex">
        <div class="hi-en he">${ex.name}</div>
        <div class="hi-sets">${ds.map((x,j)=>`<span class="hi-pill">Set ${j+1}: ${displayWeight(x.w)||'?'} × ${x.r||'?'}</span>`).join('')}</div>
        ${ex.comment ? `<div class="hi-comment">💬 ${ex.comment}</div>` : ''}
      </div>`;
    }).join('');
    return `<div class="si">
      <div class="si-top" onclick="toggleHist(${i})">
        <span class="si-r">Routine ${s.routine}</span>
        <span style="display:flex;align-items:center;gap:8px">
          <span class="si-dt">${date}</span>
          <button class="hi-del" onclick="event.stopPropagation();deleteSession(${s.id})">🗑</button>
        </span>
      </div>
      <div class="si-m" onclick="toggleHist(${i})">${tot} sets · ${dur}</div>
      <div class="si-detail" id="hd${i}">${exH}</div>
    </div>`;
  }).join('');
}
function toggleHist(i) { document.getElementById('hd'+i).classList.toggle('open'); }
function deleteSession(id) {
  const d = get();
  d.sessions = d.sessions.filter(s => s.id !== id);
  put(d);
  histRender();
}

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
initApp();
</script>
